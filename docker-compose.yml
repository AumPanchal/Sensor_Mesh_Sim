services:
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    ports:
      - "6767:6767"
    environment:
      PORT: 6767
      NODE_PORT: 8000
      NETWORK_NAME: sensor_mesh_sim_mesh
      NODE_IMAGE: sensor_mesh_sim-node
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mesh

  # Built once so the image exists for the orchestrator to spawn from.
  # Never started directly — orchestrator creates/removes node containers at runtime.
  node_template:
    build:
      context: ./node
      dockerfile: Dockerfile
    image: sensor_mesh_sim-node
    networks:
      - mesh
    entrypoint: ["true"]
    deploy:
      replicas: 0

networks:
  mesh:
    name: sensor_mesh_sim_mesh
    driver: bridge
