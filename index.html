<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Mesh Simulator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #network-state { background: #f4f4f4; padding: 15px; border-radius: 5px; font-family: monospace; white-space: pre-wrap;}
    </style>
</head>
<body>
    <h1>Sensor Mesh Discovery</h1>
    <p>Live topology aggregated from 3 isolated Docker containers:</p>
    
    <div id="network-state">Loading network state...</div>

    <script>
        async function fetchFullGraph() {
            // Fetch the local topology from all 3 nodes
            const urls = [
                'http://localhost:6701/status',
                'http://localhost:6702/status',
                'http://localhost:6703/status'
            ];
            
            try {
                const responses = await Promise.all(urls.map(url => fetch(url)));
                const nodesData = await Promise.all(responses.map(res => res.json()));
                
                // Display the stitched JSON state on the screen
                document.getElementById('network-state').textContent = JSON.stringify(nodesData, null, 2);
                
                // TODO: Insert your visual graph drawing logic here using 'nodesData'
                
            } catch (error) {
                console.error("Failed to fetch graph data.", error);
                document.getElementById('network-state').textContent = "Error fetching data. Are the Docker containers running?";
            }
        }

        // Poll the containers every 2 seconds
        setInterval(fetchFullGraph, 2000);
        fetchFullGraph();
    </script>
</body>
</html>
